name: Keep Streamlit Awake

on:
  schedule:
    # Runs every 8 hours (prevents Streamlit's 12-hour sleep)
    - cron: '0 */8 * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Required permission for the keepalive action to push a commit
permissions:
  contents: write

jobs:
  keep-awake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: Ping App with Headless Browser
        run: |
          python -c "
          from playwright.sync_api import sync_playwright
          import time

          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              print('Navigating to Streamlit app...')
              page.goto('https://my-qr-app.streamlit.app/')
              
              print('Waiting 15 seconds for Streamlit to load and establish WebSocket...')
              time.sleep(15) 
              
              print('Ping successful! App is awake.')
              browser.close()
          "

      - name: Prevent GitHub Actions Suspension
        uses: gautamkrishnar/keepalive-workflow@v2
        with:
          # Optional: customize the commit message if it ever needs to run
          commit_message: "chore: keep GitHub Actions cron alive"
